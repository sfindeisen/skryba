{% extends "index.html" %}
{% block title %}{{ post_title }}{% endblock %}
{% block main %}
<h1>{{ self.title() }}</h1>
<p>
{{ date_year }}-{{ date_month }}-{{ date_day }}
{% if date_cmt %}
; {{ date_cmt }}
{% endif %}
</p>
<ul class="tag-list">
{% for tag in tags %}
<li>{{ tag }}</li>
{% endfor %}
</ul>
{{ post_body }}
{% endblock %}
