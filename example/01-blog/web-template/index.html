<!DOCTYPE html>
<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
<link rel="stylesheet" type="text/css" href="{% block path_to_root %}.{% endblock %}/css/reset.css"/>
<link rel="stylesheet" type="text/css" href="{{ self.path_to_root() }}/css/blog.css"/>
<title>{% block title %}My personal blog{% endblock %}</title>
</head>

<body>
<h1>{{ self.title() }}</h1>
<div id="body">
<div id="menu">
{% block menu %}
<h3>All posts</h3>
{{ menu }}
{% endblock %}
</div>
<div id="main">
{% block main %}
<h3>Welcome!</h3>
<p>This is the entry page...</p>
{% endblock %}
</div>
<div id="tag-cloud">
{% block tag_cloud %}
<h3>All tags</h3>
{{ tag_cloud }}
{% endblock %}
</div>
</div>
</body>
</html>
